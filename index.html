<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7c3aed;
            --primary-light: #a78bfa;
            --primary-dark: #5b21b6;
            --accent: #06b6d4;
            --bg: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-input: #16162a;
            --border: #2a2a4a;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-glow {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background:
                radial-gradient(circle at 20% 50%, rgba(124,58,237,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(6,182,212,0.06) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
            pointer-events: none; z-index: 0;
        }
        @keyframes bgFloat {
            0%,100% { transform: translate(0,0); }
            50% { transform: translate(2%,-2%); }
        }

        /* ========== LOGIN PAGE ========== */
        #loginPage {
            position: fixed; inset: 0; z-index: 500;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg);
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%; max-width: 420px;
            text-align: center;
            position: relative; z-index: 1;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            animation: cardIn 0.5s ease-out;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-logo {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; margin: 0 auto 20px;
            box-shadow: 0 8px 24px rgba(124,58,237,0.3);
        }

        .login-title {
            font-size: 26px; font-weight: 700; margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, var(--primary-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .login-subtitle {
            color: var(--text-muted); font-size: 14px; margin-bottom: 32px; line-height: 1.5;
        }

        .login-input-wrap {
            position: relative; margin-bottom: 12px;
        }

        .login-input {
            width: 100%; padding: 14px 18px;
            background: var(--bg-input);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 16px; font-family: inherit;
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .login-input::placeholder { color: #4a5568; }
        .login-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
        }

        .login-hint {
            font-size: 12px; color: var(--text-muted); margin-bottom: 24px; text-align: left;
        }

        .login-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none; border-radius: 12px;
            color: #fff; font-size: 16px; font-weight: 600; font-family: inherit;
            cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .login-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124,58,237,0.35); }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .login-error {
            margin-top: 16px; padding: 10px 14px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 8px;
            color: #fca5a5; font-size: 13px;
            display: none;
        }

        .login-bound-user {
            margin-top: 12px; font-size: 13px; color: var(--accent);
        }

        /* ========== MAIN APP ========== */
        #mainApp { display: none; position: relative; z-index: 1; }

        /* Navbar */
        .navbar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(15,15,26,0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 32px; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }
        .logo-text {
            font-size: 20px; font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--primary-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .nav-right { display: flex; align-items: center; gap: 20px; }

        .nav-queue-badge {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 12px; border-radius: 20px;
            background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.2);
            font-size: 13px; color: var(--primary-light);
        }

        .nav-user {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; color: var(--text-muted);
        }

        .nav-user-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 14px; font-weight: 600;
        }

        /* Main Layout */
        .main-container {
            max-width: 1200px; margin: 0 auto; padding: 32px 24px;
            display: grid; grid-template-columns: 400px 1fr; gap: 28px;
            align-content: start;
        }

        /* Panel */
        .panel {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 24px;
        }

        .panel-header {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 20px; font-size: 15px; font-weight: 600;
        }
        .panel-header .icon {
            width: 30px; height: 30px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; background: rgba(124,58,237,0.15);
        }

        /* Mode Tabs */
        .mode-tabs { display: flex; gap: 4px; margin-bottom: 16px; background: var(--bg-input); border-radius: 10px; padding: 4px; }
        .mode-tab { flex: 1; padding: 8px; text-align: center; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text-muted); transition: all 0.2s; }
        .mode-tab.active { background: var(--primary); color: #fff; }
        .mode-tab:not(.active):hover { color: var(--text); }

        /* Form elements */
        .field-label {
            display: block; font-size: 12px; font-weight: 500;
            color: var(--text-muted); margin-bottom: 8px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        .prompt-box {
            width: 100%; min-height: 110px;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 12px; padding: 14px;
            color: var(--text); font-family: inherit; font-size: 14px;
            line-height: 1.6; resize: vertical; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .prompt-box::placeholder { color: #4a5568; }
        .prompt-box:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
        }

        .prompt-count {
            text-align: right; font-size: 11px; color: var(--text-muted); margin-top: 4px;
        }

        .size-options { display: flex; gap: 8px; margin-top: 20px; }
        .size-option {
            flex: 1; padding: 10px 8px;
            background: var(--bg-input); border: 2px solid var(--border);
            border-radius: 10px; cursor: pointer; text-align: center;
            transition: all 0.2s; user-select: none;
        }
        .size-option:hover { border-color: var(--primary-light); }
        .size-option.active {
            border-color: var(--primary); background: rgba(124,58,237,0.1);
            box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
        }
        .size-option .si {
            width: 28px; height: 28px; margin: 0 auto 6px;
            border: 2px solid var(--text-muted); border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 9px; color: var(--text-muted); transition: all 0.2s;
        }
        .size-option.active .si { border-color: var(--primary-light); color: var(--primary-light); }
        .size-option .sl { font-size: 13px; font-weight: 600; }
        .size-option .sd { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

        .num-selector { display: flex; align-items: center; gap: 12px; margin-top: 20px; }
        .num-selector .label { font-size: 12px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
        .num-btns { display: flex; gap: 6px; }
        .num-btn {
            width: 36px; height: 36px; border-radius: 8px;
            border: 1px solid var(--border); background: var(--bg-input);
            color: var(--text-muted); font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .num-btn:hover { border-color: var(--primary-light); color: var(--text); }
        .num-btn.active {
            border-color: var(--primary); background: rgba(124,58,237,0.15); color: var(--primary-light);
        }

        .generate-btn {
            width: 100%; margin-top: 24px; padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none; border-radius: 12px;
            color: #fff; font-size: 15px; font-weight: 600; font-family: inherit;
            cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            position: relative; overflow: hidden;
        }
        .generate-btn::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: translateX(-100%); transition: transform 0.5s;
        }
        .generate-btn:hover::before { transform: translateX(100%); }
        .generate-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124,58,237,0.35); }
        .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

        /* Queue Panel */
        .queue-panel {
            margin-top: 16px;
            background: rgba(124,58,237,0.05);
            border: 1px solid rgba(124,58,237,0.15);
            border-radius: 10px; padding: 14px;
        }
        .queue-title {
            font-size: 12px; font-weight: 600; color: var(--primary-light);
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;
        }
        .queue-list { display: flex; flex-direction: column; gap: 8px; }
        .queue-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 12px; background: var(--bg-input);
            border-radius: 8px; font-size: 13px;
        }
        .queue-pos {
            width: 28px; height: 28px; border-radius: 50%;
            background: var(--primary); color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700; flex-shrink: 0;
        }
        .queue-pos.done { background: var(--success); }
        .queue-pos.processing { background: var(--accent); animation: pulse 1s infinite; }
        .queue-pos.failed { background: var(--error); }
        .queue-info { flex: 1; min-width: 0; }
        .queue-info .qp { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .queue-info .qs { font-size: 11px; margin-top: 2px; }
        .queue-info .qs.queued { color: var(--warning); }
        .queue-info .qs.processing { color: var(--accent); }
        .queue-info .qs.done { color: var(--success); }
        .queue-info .qs.failed { color: var(--error); }
        .queue-empty { font-size: 13px; color: var(--text-muted); text-align: center; padding: 8px; }

        /* Right - Preview */
        .preview-panel { display: flex; flex-direction: column; }
        .preview-area {
            flex: 1; min-height: 440px;
            background: var(--bg-input); border: 2px dashed var(--border);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden; transition: border-color 0.3s;
        }
        .preview-area.has-images { border-style: solid; }
        .preview-area.loading { border-color: var(--primary); }

        .empty-state { text-align: center; padding: 40px; }
        .empty-icon {
            width: 72px; height: 72px; margin: 0 auto 16px;
            background: rgba(124,58,237,0.1); border-radius: 18px;
            display: flex; align-items: center; justify-content: center; font-size: 32px;
        }
        .empty-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
        .empty-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

        /* Loading */
        .loading-overlay {
            position: absolute; inset: 0;
            background: rgba(15,15,26,0.85); backdrop-filter: blur(4px);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 10;
        }
        .spinner { width: 56px; height: 56px; position: relative; }
        .spinner-ring {
            position: absolute; inset: 0; border: 3px solid transparent; border-radius: 50%;
        }
        .spinner-ring:nth-child(1) { border-top-color: var(--primary); animation: spin 1s linear infinite; }
        .spinner-ring:nth-child(2) { inset: 7px; border-right-color: var(--accent); animation: spin 0.8s linear infinite reverse; }
        .spinner-ring:nth-child(3) { inset: 14px; border-bottom-color: var(--primary-light); animation: spin 1.2s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

        .loading-text { font-size: 14px; color: var(--text-muted); animation: loadTextPulse 1.5s ease-in-out infinite; }
        @keyframes loadTextPulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
        .loading-progress { width: 180px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
        .loading-progress-bar {
            height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 2px; width: 0%; animation: progressAnim 12s ease-in-out forwards;
        }
        @keyframes progressAnim {
            0% { width: 0%; } 20% { width: 20%; } 50% { width: 50%; } 80% { width: 75%; } 100% { width: 90%; }
        }
        .loading-position { font-size: 13px; color: var(--primary-light); font-weight: 500; }

        /* Image Grid */
        .image-grid { display: grid; gap: 10px; padding: 10px; width: 100%; height: 100%; }
        .image-grid.grid-1 { grid-template-columns: 1fr; }
        .image-grid.grid-2 { grid-template-columns: 1fr 1fr; }

        .image-item {
            border-radius: 10px; overflow: hidden; background: var(--bg);
            position: relative; display: flex; align-items: center; justify-content: center;
            animation: imgIn 0.5s ease-out;
        }
        @keyframes imgIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
        .image-item img { width: 100%; height: 100%; object-fit: contain; display: block; }
        .image-item .img-actions {
            position: absolute; top: 8px; right: 8px;
            display: flex; gap: 6px; opacity: 0; transition: opacity 0.2s;
        }
        .image-item:hover .img-actions { opacity: 1; }
        .img-action-btn {
            width: 32px; height: 32px; border-radius: 8px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            border: none; color: #fff; font-size: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        /* History */
        .history-section { margin-top: 20px; }
        .history-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 8px; margin-top: 10px;
        }
        .history-item {
            aspect-ratio: 1; border-radius: 8px; overflow: hidden;
            cursor: pointer; transition: transform 0.2s; border: 2px solid transparent;
        }
        .history-item:hover { transform: scale(1.05); border-color: var(--primary-light); }
        .history-item img { width: 100%; height: 100%; object-fit: cover; }

        /* Toast */
        .toast {
            position: fixed; top: 80px; right: 24px;
            padding: 12px 18px; border-radius: 10px;
            font-size: 13px; font-weight: 500; z-index: 200;
            transform: translateX(120%); transition: transform 0.3s ease; max-width: 360px;
        }
        .toast.show { transform: translateX(0); }
        .toast.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
        .toast.success { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
        .toast.warning { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); color: #fcd34d; }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 900px) {
            .main-container { grid-template-columns: 1fr; padding: 16px 14px; gap: 16px; }
            .preview-area { min-height: 360px; }
            .navbar { padding: 0 16px; }
            .panel { padding: 20px; }
        }

        @media (max-width: 600px) {
            .navbar { height: 56px; padding: 0 12px; }
            .logo-icon { width: 32px; height: 32px; font-size: 16px; border-radius: 8px; }
            .logo-text { font-size: 16px; }
            .nav-queue-badge { font-size: 11px; padding: 4px 10px; }
            .nav-user { font-size: 12px; }
            .nav-user-avatar { width: 28px; height: 28px; font-size: 12px; }

            .main-container { padding: 12px 8px; gap: 12px; }
            .panel { padding: 14px; border-radius: 12px; }
            .panel-header { font-size: 14px; margin-bottom: 14px; }

            .size-options { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
            .size-option .sl { font-size: 12px; }
            .num-btn { width: 40px; height: 40px; }

            .generate-btn { padding: 14px; font-size: 14px; }

            .preview-area { min-height: 260px; border-radius: 10px; }
            .image-item .img-actions { opacity: 1; }
            .img-action-btn { width: 36px; height: 36px; font-size: 16px; }
            .image-grid { padding: 6px; gap: 6px; }

            .spinner { width: 48px; height: 48px; }
            .loading-progress { width: 140px; }

            .toast {
                top: auto; bottom: 16px; right: 10px; left: 10px;
                max-width: none; text-align: center; font-size: 12px;
            }

            .history-grid { grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); }

            /* Login mobile */
            .login-card { margin: 16px; padding: 32px 24px; }
            .login-title { font-size: 22px; }
        }

        @media (max-width: 360px) {
            .main-container { padding: 8px 4px; }
            .panel { padding: 10px; }
            .size-options { gap: 4px; }
            .preview-area { min-height: 200px; }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .navbar { height: 48px; }
            .main-container { padding: 8px; gap: 8px; }
            .prompt-box { min-height: 60px; }
            .preview-area { min-height: 180px; }
            .login-card { padding: 24px 20px; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <!-- ========== LOGIN PAGE ========== -->
    <div id="loginPage">
        <div class="login-card">
            <div class="login-logo">✦</div>
            <div class="login-title">AI Image Studio</div>
            <div class="login-subtitle">输入用户名开始创作<br>支持中文、英文或组合</div>

            <div class="login-input-wrap">
                <input type="text" class="login-input" id="usernameInput"
                       placeholder="请输入用户名（不能为空）"
                       maxlength="30" autocomplete="off">
            </div>
            <div class="login-hint">用户名将绑定到你的 IP 地址</div>
            <button class="login-btn" id="loginBtn" onclick="handleLogin()">
                进入工作室
            </button>
            <div class="login-error" id="loginError"></div>
            <div class="login-bound-user" id="boundUserHint" style="display:none;"></div>
        </div>
    </div>

    <!-- ========== MAIN APP ========== -->
    <div id="mainApp">
        <nav class="navbar">
            <a class="logo" href="#">
                <div class="logo-icon">✦</div>
                <span class="logo-text">AI Image Studio</span>
            </a>
            <div class="nav-right">
                <div class="nav-queue-badge" id="globalQueueBadge">
                    队列 <span id="globalQueueCount">0</span>/50
                </div>
                <a href="#" class="nav-user" id="refreshBtn" onclick="handleRefresh(event)" title="刷新队列和状态" style="cursor:pointer;text-decoration:none;">
                    <div class="nav-user-avatar" id="refreshIcon" style="font-size:14px;">↻</div>
                    <span style="font-size:12px;color:var(--text-muted);">刷新</span>
                </a>
                <div class="nav-user">
                    <div class="nav-user-avatar" id="userAvatar">G</div>
                    <span id="navUsername">guest</span>
                    <span id="navMoney" style="color:#fcd34d;font-weight:600;font-size:12px;margin-left:4px;">0</span>
                    <span style="font-size:11px;color:#fcd34d;">币</span>
                </div>
            </div>
        </nav>

        <div class="main-container">
            <!-- Left: Controls -->
            <div class="panel">
                <div class="panel-header">
                    <div class="icon">🎨</div>
                    <span>创作设置</span>
                </div>

                <div class="mode-tabs">
                    <div class="mode-tab active">文生图</div>
                    <div class="mode-tab" onclick="location.href='/ImgEditor.html'">图生图</div>
                </div>

                <label class="field-label">Prompt 提示词</label>
                <textarea class="prompt-box" id="promptInput"
                    placeholder="描述你想生成的图片...&#10;Ctrl+Enter 快速生成"
                    maxlength="2000"></textarea>
                <div class="prompt-count"><span id="charCount">0</span> / 2000</div>

                <label class="field-label" style="margin-top:18px;">图片尺寸</label>
                <div class="size-options">
                    <div class="size-option active" data-size="512x512" onclick="selectSize(this)">
                        <div class="si" style="width:22px;height:22px;">1:1</div>
                        <div class="sl">512x512</div>
                        <div class="sd">标准 · 1币/张</div>
                    </div>
                    <div class="size-option" data-size="1024x1024" onclick="selectSize(this)">
                        <div class="si" style="width:28px;height:28px;">1:1</div>
                        <div class="sl">1024x1024</div>
                        <div class="sd">高清 · 2币/张</div>
                    </div>
                    <div class="size-option" data-size="1024x768" onclick="selectSize(this)">
                        <div class="si" style="width:30px;height:22px;">4:3</div>
                        <div class="sl">1024x768</div>
                        <div class="sd">横屏 · 1币/张</div>
                    </div>
                    <div class="size-option" data-size="768x1024" onclick="selectSize(this)">
                        <div class="si" style="width:22px;height:30px;">3:4</div>
                        <div class="sl">768x1024</div>
                        <div class="sd">竖屏 · 1币/张</div>
                    </div>
                </div>

                <div class="num-selector">
                    <span class="label">生成数量</span>
                    <div class="num-btns">
                        <button class="num-btn active" data-num="1" onclick="selectNum(this)">1</button>
                        <button class="num-btn" data-num="2" onclick="selectNum(this)">2</button>
                        <button class="num-btn" data-num="4" onclick="selectNum(this)">4</button>
                    </div>
                </div>

                <button class="generate-btn" id="generateBtn" onclick="generateImage()">
                    <span>✦ 开始生成</span>
                </button>

                <!-- Queue panel -->
                <div class="queue-panel">
                    <div class="queue-title">我的生图队列 <span id="userQueueCount">0</span>/3</div>
                    <div class="queue-list" id="queueList">
                        <div class="queue-empty">暂无任务</div>
                    </div>
                </div>
            </div>

            <!-- Right: Preview -->
            <div class="panel preview-panel">
                <div class="panel-header">
                    <div class="icon">🖼️</div>
                    <span>图片预览</span>
                </div>
                <div class="preview-area" id="previewArea">
                    <div class="empty-state" id="emptyState">
                        <div class="empty-icon">🎨</div>
                        <div class="empty-title">等待创作</div>
                        <div class="empty-desc">输入提示词，点击生成按钮<br>开始你的 AI 创作之旅</div>
                    </div>
                </div>

                <div class="history-section" id="historySection" style="display:none;">
                    <div class="panel-header" style="margin-bottom:0;display:flex;justify-content:space-between;width:100%;">
                        <div style="display:flex;align-items:center;gap:10px;">
                            <div class="icon">📁</div>
                            <span>历史记录</span>
                            <span id="imageCountBadge" style="font-size:11px;color:var(--text-muted);font-weight:400;"></span>
                        </div>
                        <button class="img-action-btn" style="width:auto;padding:4px 12px;font-size:12px;border-radius:6px;display:flex;align-items:center;gap:4px;" title="删除所有图片" onclick="deleteAllImages()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                            清空
                        </button>
                    </div>
                    <div class="history-grid" id="historyGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    // ===== State =====
    let authToken = localStorage.getItem('authToken') || '';
    let currentUser = localStorage.getItem('currentUser') || '';
    let currentMoney = 0;
    let selectedSize = '512x512';
    let selectedNum = 1;
    let isGenerating = false;
    let queuePollTimer = null;
    let activeResultPolls = {}; // queueId -> timer (不再自动轮询，仅保留结构)
    let lastRefreshTime = 0;  // 上次刷新时间，用于节流

    // ===== 默认提示词库 =====
    const DEFAULT_PROMPTS = [
        "江南烟雨小镇，一位旗袍美女，手持油伞，站在桥旁，水墨画风格",
        "赛博朋克城市夜景，霓虹灯闪烁，雨后湿滑的街道，科幻感十足",
        "一只穿着宇航服的猫咪，漂浮在太空中，背景是绚丽的星云",
        "古风仙侠，白衣剑客站在悬崖边，云雾缭绕，夕阳余晖",
        "日式樱花小径，粉色花瓣飘落，远处有一座红色鸟居",
        "一位精灵公主在魔法森林中，周围是发光的蘑菇和萤火虫",
        "中国水墨画风格，黄山云海，松树苍劲，意境悠远",
        "未来都市，空中列车穿梭，高楼大厦倒映在河面上",
        "北欧极光下的小木屋，雪地静谧，星空璀璨",
        "敦煌壁画风格，飞天仙女，色彩绚丽，线条流畅",
        "一只金色的龙盘旋在雪山之巅，云雾中若隐若现",
        "威尼斯水城日落，贡多拉小船，暖色调油画风格",
    ];

    // ===== DOM =====
    const $ = id => document.getElementById(id);

    // 兼容性 fetch 超时（替代 AbortSignal.timeout，微信/Safari 低版本不支持）
    function fetchWithTimeout(url, options, ms) {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), ms);
        return fetch(url, { ...options, signal: ctrl.signal }).finally(() => clearTimeout(timer));
    }

    // ===== Init =====
    (async function init() {
        const btn = $('loginBtn');
        const errEl = $('loginError');

        // 先检测后端是否在线
        try {
            const healthResp = await fetchWithTimeout('/api/check-ip', {}, 5000);
            if (!healthResp.ok) throw new Error('not ok');
        } catch(e) {
            // 后端不可用
            btn.disabled = true;
            btn.textContent = '服务器未启动';
            btn.style.background = '#555';
            btn.style.cursor = 'not-allowed';
            errEl.textContent = '后端服务器未启动，请稍后刷新页面重试';
            errEl.style.display = '';
            // 每 5 秒重试检测
            const retryTimer = setInterval(async () => {
                try {
                    const r = await fetchWithTimeout('/api/check-ip', {}, 3000);
                    if (r.ok) {
                        clearInterval(retryTimer);
                        btn.disabled = false;
                        btn.textContent = '进入工作室';
                        btn.style.background = '';
                        btn.style.cursor = '';
                        errEl.style.display = 'none';
                        // 恢复后继续正常初始化
                        initAfterServerUp();
                    }
                } catch(e) {}
            }, 5000);
            return; // 不继续后续初始化
        }

        initAfterServerUp();
    })();

    async function initAfterServerUp() {
        // Check IP binding on server
        try {
            const resp = await fetch('/api/check-ip');
            const data = await resp.json();

            if (authToken && currentUser) {
                // Verify session still valid
                try {
                    const sr = await fetch('/api/check-session', {
                        headers: { 'Authorization': 'Bearer ' + authToken }
                    });
                    if (sr.ok) {
                        const sessionData = await sr.json();
                        enterApp();
                        // 获取金币余额
                        fetchMoney();
                        return;
                    }
                } catch(e) {}

                // Session expired
                authToken = '';
                currentUser = '';
                localStorage.removeItem('authToken');
                localStorage.removeItem('currentUser');
            }

            // If IP has a bound user, show hint
            if (data.hasUser && data.username) {
                $('boundUserHint').style.display = '';
                $('boundUserHint').textContent = `检测到 IP 已绑定用户: "${data.username}"`;
                $('usernameInput').value = data.username;
            }
        } catch(e) {
            console.error('Init check failed', e);
        }
    }

    // ===== Login =====
    async function handleLogin() {
        const input = $('usernameInput').value.trim();
        const errEl = $('loginError');
        const btn = $('loginBtn');

        if (!input) {
            errEl.textContent = '用户名不能为空，请输入用户名';
            errEl.style.display = '';
            return;
        }

        btn.disabled = true;
        btn.textContent = '登录中...';
        errEl.style.display = 'none';

        try {
            const resp = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: input })
            });
            const data = await resp.json();

            if (!resp.ok) {
                errEl.textContent = data.error || '登录失败';
                errEl.style.display = '';
                if (data.boundUser) {
                    $('boundUserHint').style.display = '';
                    $('boundUserHint').textContent = `该 IP 已绑定用户: "${data.boundUser}"`;
                    $('usernameInput').value = data.boundUser;
                }
                return;
            }

            authToken = data.token;
            currentUser = data.username;
            localStorage.setItem('authToken', authToken);
            localStorage.setItem('currentUser', currentUser);
            enterApp(data.money);

        } catch(e) {
            errEl.textContent = '网络错误，请重试';
            errEl.style.display = '';
        } finally {
            btn.disabled = false;
            btn.textContent = '进入工作室';
        }
    }

    // Enter on Enter key
    $('usernameInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') handleLogin();
    });

    function enterApp(money) {
        $('loginPage').style.display = 'none';
        $('mainApp').style.display = 'block';
        $('navUsername').textContent = currentUser;
        $('userAvatar').textContent = currentUser.charAt(0).toUpperCase();
        if (typeof money === 'number') {
            currentMoney = money;
            $('navMoney').textContent = currentMoney;
        }
        $('promptInput').addEventListener('input', () => {
            $('charCount').textContent = $('promptInput').value.length;
        });
        $('promptInput').addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') generateImage();
        });

        // 随机选择1-3个默认提示词放入 placeholder
        setRandomPrompts();

        // 首次进入时自动加载一次
        refreshAll();

        // 建立 SSE 连接，监听服务端推送
        connectSSE();
    }

    // ===== SSE 实时推送 =====
    let sseSource = null;

    function connectSSE() {
        if (sseSource) { sseSource.close(); }
        sseSource = new EventSource('/api/sse?token=' + encodeURIComponent(authToken));
        sseSource.addEventListener('task_done', function(e) {
            const data = JSON.parse(e.data);
            console.log('[SSE] 收到任务完成推送:', data);
            showToast('图片生成完成!', 'success');
            // 直接用推送的图片展示，关掉 loading
            if (data.images && data.images.length > 0) {
                showImages(data.images);
            }
            refreshAll();
        });
        sseSource.addEventListener('task_failed', function(e) {
            const data = JSON.parse(e.data);
            console.log('[SSE] 收到任务失败推送:', data);
            showToast('生成失败: ' + (data.error || '未知错误'), 'error');
            // 关掉 loading
            const overlay = $('loadingOverlay');
            if (overlay) overlay.remove();
            $('previewArea').classList.remove('loading');
            refreshAll();
        });
        sseSource.onerror = function() {
            console.log('[SSE] 连接断开，3秒后重连...');
            sseSource = null;
            setTimeout(connectSSE, 3000);
        };
        console.log('[SSE] 连接已建立');
    }

    // ===== 随机默认提示词 =====
    function setRandomPrompts() {
        const count = Math.floor(Math.random() * 3) + 1; // 1-3个
        const shuffled = [...DEFAULT_PROMPTS].sort(() => Math.random() - 0.5);
        const selected = shuffled.slice(0, count);
        const tipsText = selected.map((p, i) => `${i + 1}. ${p}`).join('\n');
        $('promptInput').placeholder = `试试这些灵感：\n${tipsText}\n\nCtrl+Enter 快速生成`;
    }

    // ===== 更新金币显示 =====
    function updateMoney(amount) {
        currentMoney = amount;
        $('navMoney').textContent = currentMoney;
    }

    // ===== 手动刷新（带节流） =====
    function handleRefresh(e) {
        if (e) e.preventDefault();
        const now = Date.now();
        if (now - lastRefreshTime < 1000) {
            showToast('刷新太频繁，请稍后再试', 'warning');
            return;
        }
        lastRefreshTime = now;
        refreshAll();
    }

    async function refreshAll() {
        lastRefreshTime = Date.now();
        await Promise.all([
            fetchQueueStatus(),
            fetchGlobalQueue(),
            loadUserImages(),
            fetchMoney(),
        ]);
    }

    async function fetchMoney() {
        try {
            const resp = await fetch('/api/user-info', {
                headers: { 'Authorization': 'Bearer ' + authToken }
            });
            if (!resp.ok) return;
            const data = await resp.json();
            updateMoney(data.money);
        } catch(e) {}
    }

    // ===== 手动查询（不自动轮询） =====
    async function fetchQueueStatus() {
        try {
            const resp = await fetch('/api/queue-status', {
                headers: { 'Authorization': 'Bearer ' + authToken }
            });
            if (resp.status === 401) { logout(); return; }
            const data = await resp.json();

            $('userQueueCount').textContent = data.userQueueLength;

            const list = $('queueList');
            if (data.items.length === 0) {
                list.innerHTML = '<div class="queue-empty">暂无任务</div>';
            } else {
                list.innerHTML = data.items.map(item => {
                    const statusText = item.status === 'queued' ? '排队中' :
                                       item.status === 'processing' ? '生成中...' :
                                       item.status === 'done' ? '已完成' : '失败';
                    return `<div class="queue-item">
                        <div class="queue-pos ${item.status}">${item.status === 'done' ? '✓' : item.status === 'failed' ? '✗' : item.position}</div>
                        <div class="queue-info">
                            <div class="qp">${escapeHtml(item.prompt)}</div>
                            <div class="qs ${item.status}">${statusText}${item.status === 'queued' ? ' · 排名 #' + item.position : ''}</div>
                        </div>
                    </div>`;
                }).join('');
            }

            // 如果有未完成的任务，自动查一次结果
            data.items.forEach(item => {
                if (item.status === 'queued' || item.status === 'processing') {
                    checkSingleResult(item.id);
                }
            });

            // 检查是否还有活跃任务（排队中或生成中），控制生成按钮状态
            const hasActive = data.items.some(item => item.status === 'queued' || item.status === 'processing');
            const btn = $('generateBtn');
            if (hasActive) {
                isGenerating = true;
                btn.disabled = true;
                btn.innerHTML = '<span>生成中...</span>';
            } else {
                isGenerating = false;
                btn.disabled = false;
                btn.innerHTML = '<span>✦ 开始生成</span>';
            }

        } catch(e) { console.error('Queue fetch error', e); }
    }

    async function fetchGlobalQueue() {
        try {
            const resp = await fetch('/api/global-queue');
            const data = await resp.json();
            $('globalQueueCount').textContent = data.totalActive;
        } catch(e) {}
    }

    async function checkSingleResult(queueId) {
        try {
            const resp = await fetch('/api/result/' + queueId, {
                headers: { 'Authorization': 'Bearer ' + authToken }
            });
            if (!resp.ok) return;
            const data = await resp.json();

            if (data.status === 'done' && data.images && data.images.length > 0) {
                showImages(data.images);
                showToast('生成成功!', 'success');
                loadUserImages();
            } else if (data.status === 'failed') {
                showToast('生成失败: ' + (data.error || '未知错误'), 'error');
            }
        } catch(e) {}
    }

    // ===== Generate =====
    async function generateImage() {
        const prompt = $('promptInput').value.trim();
        if (!prompt) { showToast('请输入提示词', 'warning'); return; }
        // 禁止纯空白、纯换行等无意义内容
        if (prompt.replace(/\s/g, '').length === 0) {
            showToast('提示词不能全为空白字符', 'warning');
            return;
        }
        if (prompt.length < 2) {
            showToast('提示词至少需要 2 个字符', 'warning');
            return;
        }
        if (isGenerating) return;

        const btn = $('generateBtn');
        isGenerating = true;
        btn.disabled = true;
        btn.innerHTML = '<span>提交中...</span>';

        const [w, h] = selectedSize.split('x').map(Number);
        const costPerImage = (w >= 1024 && h >= 1024) ? 2 : 1;
        const totalCost = costPerImage * selectedNum;

        try {
            const resp = await fetch('/api/generate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + authToken,
                },
                body: JSON.stringify({
                    prompt, width: w, height: h, num_images: selectedNum
                })
            });

            const data = await resp.json();

            if (!resp.ok) {
                showToast(data.error || '提交失败', resp.status === 429 ? 'warning' : 'error');
                isGenerating = false;
                btn.disabled = false;
                btn.innerHTML = '<span>✦ 开始生成</span>';
                return;
            }

            // Show loading in preview
            showLoading(data.position, data.globalQueueLength);

            // 立即更新金币余额
            if (typeof data.moneyLeft === 'number') {
                updateMoney(data.moneyLeft);
            }

            // 立即刷新队列显示新任务
            fetchQueueStatus();

            showToast(`已加入队列，当前排名 #${data.position}，消耗金币 ${totalCost}`, 'success');

            // 按钮保持"生成中"状态，等所有任务完成后由 fetchQueueStatus 恢复
            btn.innerHTML = '<span>生成中...</span>';

        } catch(e) {
            showToast('网络错误: ' + e.message, 'error');
            isGenerating = false;
            btn.disabled = false;
            btn.innerHTML = '<span>✦ 开始生成</span>';
        }
    }

    // ===== UI Helpers =====
    function selectSize(el) {
        document.querySelectorAll('.size-option').forEach(o => o.classList.remove('active'));
        el.classList.add('active');
        selectedSize = el.dataset.size;
    }

    function selectNum(el) {
        document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        selectedNum = parseInt(el.dataset.num);
    }

    function showToast(msg, type = 'error') {
        const t = $('toast');
        t.textContent = msg;
        t.className = 'toast ' + type + ' show';
        setTimeout(() => t.classList.remove('show'), 4000);
    }

    function escapeHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function showLoading(position, total) {
        const area = $('previewArea');
        area.classList.add('loading');
        if ($('emptyState')) $('emptyState').style.display = 'none';
        const existing = area.querySelector('.image-grid');
        if (existing) existing.remove();

        const existingOverlay = $('loadingOverlay');
        if (existingOverlay) existingOverlay.remove();

        area.insertAdjacentHTML('beforeend', `
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner">
                    <div class="spinner-ring"></div>
                    <div class="spinner-ring"></div>
                    <div class="spinner-ring"></div>
                </div>
                <div class="loading-text">AI 正在为你创作中...</div>
                <div class="loading-position">队列排名 #${position} / ${total}</div>
                <div class="loading-progress">
                    <div class="loading-progress-bar"></div>
                </div>
            </div>`);
    }

    function showImages(images) {
        const area = $('previewArea');
        const overlay = $('loadingOverlay');
        if (overlay) overlay.remove();
        area.classList.remove('loading');
        area.classList.add('has-images');

        const existingGrid = area.querySelector('.image-grid');
        if (existingGrid) existingGrid.remove();

        const gridClass = images.length === 1 ? 'grid-1' : 'grid-2';
        const grid = document.createElement('div');
        grid.className = 'image-grid ' + gridClass;

        images.forEach(src => {
            const item = document.createElement('div');
            item.className = 'image-item';
            item.innerHTML = `
                <img src="${src}" alt="Generated Image" />
                <div class="img-actions">
                    <button class="img-action-btn" title="下载" onclick="downloadImg('${src}')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    </button>
                    <button class="img-action-btn" title="新窗口打开" onclick="window.open('${src}','_blank')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                    </button>
                </div>`;
            grid.appendChild(item);
        });

        area.appendChild(grid);
    }

    function downloadImg(src) {
        const a = document.createElement('a');
        a.href = src; a.download = 'ai-image-' + Date.now() + '.png';
        a.click();
    }

    async function loadUserImages() {
        try {
            const resp = await fetch('/api/user-images', {
                headers: { 'Authorization': 'Bearer ' + authToken }
            });
            if (!resp.ok) return;
            const data = await resp.json();

            if (data.images.length === 0) {
                $('historySection').style.display = 'none';
                return;
            }

            $('historySection').style.display = '';
            $('imageCountBadge').textContent = `${data.images.length}/20 张`;

            $('historyGrid').innerHTML = data.images.slice(0, 20).map(src =>
                `<div class="history-item" onclick="showImages(['${src}'])">
                    <img src="${src}" alt="History"/>
                    <div style="position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:#fca5a5;opacity:0;transition:opacity 0.2s;" onclick="event.stopPropagation();deleteSingleImage('${src}')">✕</div>
                </div>`
            ).join('');

            // 让 history-item 的删除按钮在 hover 时显示
            $('historyGrid').querySelectorAll('.history-item').forEach(item => {
                const delBtn = item.querySelector('div[onclick*="deleteSingleImage"]');
                if (delBtn) {
                    item.addEventListener('mouseenter', () => delBtn.style.opacity = '1');
                    item.addEventListener('mouseleave', () => delBtn.style.opacity = '0');
                }
            });
        } catch(e) {}
    }

    async function deleteSingleImage(src) {
        if (!confirm('确定删除这张图片？')) return;
        try {
            await fetch('/api/delete-image', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
                body: JSON.stringify({ path: src })
            });
            showToast('已删除', 'success');
            loadUserImages();
        } catch(e) { showToast('删除失败', 'error'); }
    }

    async function deleteAllImages() {
        if (!confirm('确定清空所有图片？此操作不可恢复！')) return;
        try {
            const resp = await fetch('/api/delete-all-images', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + authToken }
            });
            const data = await resp.json();
            showToast(`已删除 ${data.deleted || 0} 张图片`, 'success');
            loadUserImages();
            // 清空预览区
            const area = $('previewArea');
            const grid = area.querySelector('.image-grid');
            if (grid) grid.remove();
            area.classList.remove('has-images');
            if ($('emptyState')) $('emptyState').style.display = '';
        } catch(e) { showToast('删除失败', 'error'); }
    }

    function logout() {
        authToken = '';
        currentUser = '';
        localStorage.removeItem('authToken');
        localStorage.removeItem('currentUser');
        location.reload();
    }
    </script>
</body>
</html>
