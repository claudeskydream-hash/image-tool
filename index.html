<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7c3aed; --primary-light: #a78bfa; --primary-dark: #5b21b6;
            --accent: #06b6d4; --bg: #0f0f1a; --bg-card: #1a1a2e; --bg-input: #16162a;
            --border: #2a2a4a; --text: #e2e8f0; --text-muted: #94a3b8;
            --error: #ef4444; --warning: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .bg-glow {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background:
                radial-gradient(circle at 20% 50%, rgba(124,58,237,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(6,182,212,0.06) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite; pointer-events: none; z-index: 0;
        }
        @keyframes bgFloat { 0%,100%{transform:translate(0,0)} 50%{transform:translate(2%,-2%)} }

        .login-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 20px; padding: 48px 40px;
            width: 100%; max-width: 420px; text-align: center;
            position: relative; z-index: 1;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            animation: cardIn 0.5s ease-out;
        }
        @keyframes cardIn { from{opacity:0;transform:translateY(30px) scale(0.96)} to{opacity:1;transform:none} }

        .login-logo {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            font-size: 30px; margin: 0 auto 20px;
            box-shadow: 0 8px 24px rgba(124,58,237,0.3);
        }
        .login-title {
            font-size: 26px; font-weight: 700; margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, var(--primary-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .login-subtitle {
            color: var(--text-muted); font-size: 14px; margin-bottom: 32px; line-height: 1.5;
        }
        .login-input {
            width: 100%; padding: 14px 18px;
            background: var(--bg-input); border: 2px solid var(--border);
            border-radius: 12px; color: var(--text); font-size: 16px; font-family: inherit;
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
            margin-bottom: 12px;
        }
        .login-input::placeholder { color: #4a5568; }
        .login-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
        .login-hint { font-size: 12px; color: var(--text-muted); margin-bottom: 24px; text-align: left; }
        .login-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none; border-radius: 12px;
            color: #fff; font-size: 16px; font-weight: 600; font-family: inherit;
            cursor: pointer; transition: all 0.3s;
        }
        .login-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124,58,237,0.35); }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .login-error {
            margin-top: 16px; padding: 10px 14px;
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
            border-radius: 8px; color: #fca5a5; font-size: 13px; display: none;
        }
        .login-bound-user { margin-top: 12px; font-size: 13px; color: var(--accent); }

        @media (max-width: 600px) {
            .login-card { margin: 16px; padding: 32px 24px; }
            .login-title { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="login-card">
        <div class="login-logo">✦</div>
        <div class="login-title">AI Image Studio</div>
        <div class="login-subtitle">输入用户名开始创作<br>支持中文、英文或组合</div>
        <input type="text" class="login-input" id="usernameInput"
               placeholder="请输入用户名（不能为空）"
               maxlength="30" autocomplete="off">
        <div class="login-hint">用户名将绑定到你的 IP 地址</div>
        <button class="login-btn" id="loginBtn" onclick="handleLogin()">进入工作室</button>
        <div class="login-error" id="loginError"></div>
        <div class="login-bound-user" id="boundUserHint" style="display:none;"></div>
    </div>

<script>
const $ = id => document.getElementById(id);

function fetchWithTimeout(url, opt, ms) {
    const c = new AbortController(); const t = setTimeout(() => c.abort(), ms);
    return fetch(url, { ...opt, signal: c.signal }).finally(() => clearTimeout(t));
}

async function handleLogin() {
    const input = $('usernameInput').value.trim();
    const errEl = $('loginError');
    const btn = $('loginBtn');

    if (!input) {
        errEl.textContent = '用户名不能为空，请输入用户名';
        errEl.style.display = '';
        return;
    }

    btn.disabled = true;
    btn.textContent = '登录中...';
    errEl.style.display = 'none';

    try {
        const resp = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: input })
        });
        const data = await resp.json();

        if (!resp.ok) {
            errEl.textContent = data.error || '登录失败';
            errEl.style.display = '';
            if (data.boundUser) {
                $('boundUserHint').style.display = '';
                $('boundUserHint').textContent = '该 IP 已绑定用户: "' + data.boundUser + '"';
                $('usernameInput').value = data.boundUser;
            }
            return;
        }

        localStorage.setItem('authToken', data.token);
        localStorage.setItem('currentUser', data.username);
        location.href = '/ImgEditor.html';

    } catch(e) {
        errEl.textContent = '网络错误，请重试';
        errEl.style.display = '';
    } finally {
        btn.disabled = false;
        btn.textContent = '进入工作室';
    }
}

// Init
(async function init() {
    const btn = $('loginBtn');
    const errEl = $('loginError');

    try {
        const healthResp = await fetchWithTimeout('/api/check-ip', {}, 5000);
        if (!healthResp.ok) throw new Error('not ok');
    } catch(e) {
        btn.disabled = true;
        btn.textContent = '服务器未启动';
        btn.style.background = '#555';
        btn.style.cursor = 'not-allowed';
        errEl.textContent = '后端服务器未启动，请稍后刷新页面重试';
        errEl.style.display = '';
        const retryTimer = setInterval(async () => {
            try {
                const r = await fetchWithTimeout('/api/check-ip', {}, 3000);
                if (r.ok) {
                    clearInterval(retryTimer);
                    btn.disabled = false; btn.textContent = '进入工作室';
                    btn.style.background = ''; btn.style.cursor = '';
                    errEl.style.display = 'none';
                    initAfterServerUp();
                }
            } catch(e) {}
        }, 5000);
        return;
    }
    initAfterServerUp();
})();

async function initAfterServerUp() {
    const authToken = localStorage.getItem('authToken');
    const currentUser = localStorage.getItem('currentUser');

    if (authToken && currentUser) {
        try {
            const sr = await fetch('/api/check-session', {
                headers: { 'Authorization': 'Bearer ' + authToken }
            });
            if (sr.ok) {
                location.href = '/ImgEditor.html';
                return;
            }
        } catch(e) {}
        localStorage.removeItem('authToken');
        localStorage.removeItem('currentUser');
    }

    try {
        const resp = await fetch('/api/check-ip');
        const data = await resp.json();
        if (data.hasUser && data.username) {
            $('boundUserHint').style.display = '';
            $('boundUserHint').textContent = '检测到 IP 已绑定用户: "' + data.username + '"';
            $('usernameInput').value = data.username;
        }
    } catch(e) {}
}

$('usernameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
});
</script>
</body>
</html>
